<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juice Shop Register</title>
    <style>
        body {
            background-color: #5e5858c7;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        div {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.418);
        }
        h2 {
            margin-bottom: 20px;
        }
        input {
            display: block;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #245e94;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background-color: #245e94c7;
        }
        error {
            color: red;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div>
        <h2>Register</h2>
        <form id="registerForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Create Account</button>
            <error id="error" class="error"></error>
        </form>
        <p style="font-size: 14px; margin-top: 15px;">
            Already have an account? <a href="index.html">Login here</a>
        </p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            
            let errors = [];
        
            if (!email.includes('@')) {
                errors.push('Please enter a valid email address.');
            }

            if (password.length < 8) {
                errors.push('Password must be at least 8 characters long.');
            }

            if (!/[A-Z]/.test(password)) {
                errors.push('Password must contain at least one uppercase letter.');
            } 
            
            if (errors.length > 0) {
                errorDiv.innerHTML = errors.join('<br>');
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
                
                try {
                    // registration endpoint
                    const response = await fetch('/api/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email: email, password: password })
                    });

                    const data = await response.json();
                    
                    if (response.ok) {
                        alert('Registration successful! Redirecting to login.');
                        window.location.href = 'index.html'; // Redirect to login page
                    } else {
                        errorDiv.innerHTML = data.error || "Registration failed.";
                        errorDiv.style.display = 'block';
                    }
                } catch (error) {
                    console.error('Error during registration:', error);
                    errorDiv.innerHTML = "Server connection failed.";
                    errorDiv.style.display = 'block';
                }
            }
        });
    </script>
</body>
</html>
